<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberNova - Products</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="products.css">
  <link rel="stylesheet" href="compact-fix.css">
  <link rel="stylesheet" href="search.css">
  <link rel="stylesheet" href="breadcrumb.css">
  <link rel="stylesheet" href="nova.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <nav>
    <div class="nav-logo">CYBER<span>NOVA</span></div>
    <div class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="computer.html">Computers</a>
      <a href="phones.html">Phones</a>
      <a href="#">About</a>
    </div>
    <div class="nav-icons">
      <button class="search-trigger-btn" aria-label="Open search">
        <i class="fas fa-search"></i>
        <span>Search</span>
      </button>
      <button class="cart-btn">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-count">0</span>
      </button>
      <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
    </div>
  </nav>

  <div class="search-overlay" id="searchOverlay">
    <div class="search-panel" id="searchPanel">

      <div class="search-input-row">
        <i class="fas fa-search" id="searchIcon"></i>
        <input id="searchInput" type="text" placeholder="Search products, brands..." autocomplete="off" />
        <span id="searchMeta" class="search-meta"></span>
        <button class="search-close-btn" id="closeSearchBtn" aria-label="Close search">
          <i class="fas fa-times"></i>
        </button>
      </div>

      <div class="search-trending-zone" id="trendingZone">
        <div class="search-trending-label">TRENDING NOW</div>
        <div class="search-chips" id="trendingChips"></div>
      </div>

      <div class="search-results-zone" id="resultsZone"></div>

      <div class="search-empty-zone" id="emptyZone">
        <i class="fas fa-meh"></i>
        <div>No matching results</div>
      </div>

    </div>
  </div>

  <div class="cart-panel" id="cartPanel">
    <div class="cart-arrow"></div>

    <div class="cart-panel-header">
      <span class="cart-panel-title">YOUR CART</span>
      <button class="cart-close" id="cartClose"><i class="fas fa-times"></i></button>
    </div>

    <div class="cart-ship-bar-wrap">
      <div class="cart-ship-row">
        <span id="shipLabel">أضف منتجات لشحن مجاني</span>
        <span id="shipPercent" class="cart-ship-percent">0%</span>
      </div>
      <div class="cart-ship-track">
        <div class="cart-ship-fill" id="shipFill"></div>
      </div>
    </div>

    <div class="cart-items" id="cartItemsList"></div>

    <div class="cart-panel-footer">
      <div class="cart-total-row">
        <span>TOTAL</span>
        <span id="cartTotal">0$</span>
      </div>
      <button class="cart-checkout-btn" id="checkoutBtn">
        <i class="fas fa-lock"></i> CHECKOUT
      </button>
      <button class="cart-view-btn" id="viewCartBtn">عرض السلة كاملة</button>
    </div>
  </div>

  <div class="cart-overlay-catcher" id="cartCatcher"></div>

  <div class="wrapper">
    <canvas id="glCanvas"></canvas>

    <div class="page">
      <div class="page-skeleton" id="pageSkeleton">
        <div class="skel skel-label"></div>
        <div class="skel skel-title"></div>
        <div class="skel-stage">
          <div class="skel skel-img"></div>
          <div class="skel-info">
            <div class="skel skel-badge"></div>
            <div class="skel skel-name"></div>
            <div class="skel skel-brand"></div>
            <div class="skel skel-price"></div>
          </div>
        </div>
        <div class="skel-minirow">
          <div class="skel skel-mini"></div>
          <div class="skel skel-mini"></div>
          <div class="skel skel-mini"></div>
          <div class="skel skel-mini"></div>
        </div>
      </div>

      <div class="bg-glow" id="glow"></div>
      <div class="cat-label">Category</div>
      <div class="cat-title" id="catTitle">LAPTOPS</div>

      <div class="stage">
        <div class="product-card" id="card">
          <div class="img-wrap" id="img">
            <i class="fas fa-laptop"></i>
            <div class="discount-tag" id="discount">SALE</div>
          </div>
          <div class="info">
            <div class="best-badge"><i class="fas fa-crown"></i> Best in category</div>
            <div class="p-name" id="pname">MacBook Pro M3</div>
            <div class="p-brand" id="pbrand">APPLE — 2024</div>
            <div class="p-stars" id="pstars">★★★★★ <span id="previews">(412 reviews)</span></div>
            <div class="p-colors">
              <div class="p-dot active" style="background:#8e8e8e"></div>
              <div class="p-dot" style="background:#1a1a1a"></div>
              <div class="p-dot" style="background:#e8d9b5"></div>
            </div>
            <div class="p-price-row">
              <div class="p-price-wrap">
                <span class="p-old-price" id="oldprice" style="visibility:hidden">2,299$</span>
                <span class="p-price" id="pprice">1,999$</span>
              </div>
              <button class="p-add" id="addBtn"><i class="fas fa-shopping-cart"></i> Add to cart</button>
            </div>
          </div>
        </div>
      </div>

      <div class="others-label" id="othersLabel">Other laptops</div>
      <div class="mini-row" id="miniRow"></div>
    </div>
  </div>

  <div class="nova-bubble" id="novaBubble" aria-label="Open NOVA assistant">
    <div class="nova-pulse"></div>
    <i class="fas fa-magic"></i>
    <span class="nova-dot" id="novaDot"></span>
  </div>

  <div class="nova-panel" id="novaPanel">
    <div class="nova-header">
      <div class="nova-avatar"><i class="fas fa-magic"></i></div>
      <div class="nova-header-text">
        <div class="nova-name">NOVA</div>
        <div class="nova-status"><span></span>Online</div>
      </div>
      <button class="nova-close" id="novaClose" aria-label="Close"><i class="fas fa-times"></i></button>
    </div>
    <div class="nova-messages" id="novaMessages"></div>
    <div class="nova-options-zone" id="novaOptionsZone"></div>
  </div>

  <script src="bg-products.js"></script>
  <script src="products-data.js"></script>
  <script src="products.js"></script>
  <script src="transition.js"></script>
  <script>
    document.getElementById('menuToggle').addEventListener('click', function() {
      document.getElementById('navLinks').classList.toggle('mobile-open');
    });
  </script>
  <script src="cart.js"></script>
  <script src="search.js"></script>
  <script src="breadcrumb.js"></script>
  <script src="nova.js"></script>
</body>
</html>
